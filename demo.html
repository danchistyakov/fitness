<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitAnalytics - Система аналитики фитнес-центра</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.10.3/Recharts.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --bg-card-hover: #22222e;
            --bg-elevated: #252532;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --text-muted: #6b6b7b;
            --accent-primary: #00d4aa;
            --accent-secondary: #00b894;
            --accent-glow: rgba(0, 212, 170, 0.3);
            --warning: #ffc107;
            --warning-soft: rgba(255, 193, 7, 0.15);
            --danger: #ff4757;
            --danger-soft: rgba(255, 71, 87, 0.15);
            --success: #00d4aa;
            --success-soft: rgba(0, 212, 170, 0.15);
            --info: #5c7cfa;
            --info-soft: rgba(92, 124, 250, 0.15);
            --purple: #a855f7;
            --purple-soft: rgba(168, 85, 247, 0.15);
            --border-color: rgba(255, 255, 255, 0.08);
            --font-primary: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --space-xs: 4px; --space-sm: 8px; --space-md: 16px; --space-lg: 24px; --space-xl: 32px; --space-2xl: 48px;
            --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px;
            --shadow-glow: 0 0 40px var(--accent-glow);
            --transition-fast: 150ms ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-primary); background: var(--bg-primary); color: var(--text-primary); line-height: 1.6; min-height: 100vh; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); }
        ::-webkit-scrollbar-thumb { background: var(--bg-elevated); border-radius: 4px; }
        .app { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--bg-secondary); border-right: 1px solid var(--border-color); padding: var(--space-lg); display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 100; }
        .sidebar-logo { display: flex; align-items: center; gap: var(--space-md); margin-bottom: var(--space-2xl); padding-bottom: var(--space-lg); border-bottom: 1px solid var(--border-color); }
        .logo-icon { width: 44px; height: 44px; background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-glow); }
        .logo-text { font-size: 1.25rem; font-weight: 700; }
        .logo-text span { color: var(--accent-primary); }
        .nav-section { margin-bottom: var(--space-lg); }
        .nav-section-title { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: var(--space-sm); padding-left: var(--space-md); }
        .nav-item { display: flex; align-items: center; gap: var(--space-md); padding: var(--space-md); border-radius: var(--radius-md); color: var(--text-secondary); font-weight: 500; font-size: 0.9rem; transition: all var(--transition-fast); cursor: pointer; border: none; background: none; width: 100%; text-align: left; }
        .nav-item:hover { background: var(--bg-card); color: var(--text-primary); }
        .nav-item.active { background: var(--accent-primary); color: var(--bg-primary); box-shadow: var(--shadow-glow); }
        .main-content { flex: 1; margin-left: 260px; padding: var(--space-xl); min-height: 100vh; }
        .page-header { margin-bottom: var(--space-xl); }
        .page-title { font-size: 2rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: var(--space-xs); }
        .page-subtitle { color: var(--text-secondary); font-size: 0.95rem; }
        .card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: var(--space-lg); transition: all 250ms ease; }
        .card:hover { border-color: rgba(255,255,255,0.15); }
        .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-lg); }
        .card-title { font-size: 1rem; font-weight: 600; color: var(--text-secondary); }
        .card-value { font-size: 2.5rem; font-weight: 800; letter-spacing: -0.03em; font-family: var(--font-mono); }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-lg); margin-bottom: var(--space-xl); }
        .stat-card { position: relative; overflow: hidden; }
        .stat-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--accent-primary); border-radius: var(--radius-sm) 0 0 var(--radius-sm); }
        .stat-card.warning::before { background: var(--warning); }
        .stat-card.danger::before { background: var(--danger); }
        .stat-card.info::before { background: var(--info); }
        .stat-card.purple::before { background: var(--purple); }
        .stat-icon { width: 48px; height: 48px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; background: var(--success-soft); margin-bottom: var(--space-md); }
        .stat-icon.warning { background: var(--warning-soft); }
        .stat-icon.danger { background: var(--danger-soft); }
        .stat-icon.info { background: var(--info-soft); }
        .stat-icon.purple { background: var(--purple-soft); }
        .stat-change { display: inline-flex; align-items: center; gap: var(--space-xs); font-size: 0.85rem; font-weight: 600; padding: var(--space-xs) var(--space-sm); border-radius: var(--radius-sm); margin-top: var(--space-sm); }
        .stat-change.positive { background: var(--success-soft); color: var(--success); }
        .stat-change.negative { background: var(--danger-soft); color: var(--danger); }
        .charts-grid { display: grid; grid-template-columns: 2fr 1fr; gap: var(--space-lg); margin-bottom: var(--space-xl); }
        .chart-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: var(--space-lg); }
        .badge { display: inline-flex; align-items: center; padding: var(--space-xs) var(--space-sm); border-radius: var(--radius-sm); font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
        .badge.success { background: var(--success-soft); color: var(--success); }
        .badge.warning { background: var(--warning-soft); color: var(--warning); }
        .badge.danger { background: var(--danger-soft); color: var(--danger); }
        .badge.info { background: var(--info-soft); color: var(--info); }
        .btn { display: inline-flex; align-items: center; gap: var(--space-sm); padding: var(--space-md) var(--space-lg); border-radius: var(--radius-md); font-family: var(--font-primary); font-size: 0.9rem; font-weight: 600; cursor: pointer; border: none; transition: all var(--transition-fast); }
        .btn-primary { background: var(--accent-primary); color: var(--bg-primary); }
        .btn-primary:hover { background: var(--accent-secondary); box-shadow: var(--shadow-glow); }
        .btn-secondary { background: var(--bg-elevated); color: var(--text-primary); border: 1px solid var(--border-color); }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-primary), var(--info)); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 0.9rem; color: var(--bg-primary); }
        .loading { display: flex; align-items: center; justify-content: center; padding: var(--space-2xl); flex-direction: column; gap: var(--space-md); }
        .spinner { width: 40px; height: 40px; border: 3px solid var(--bg-elevated); border-top-color: var(--accent-primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .recommendation-card { display: flex; gap: var(--space-lg); padding: var(--space-lg); background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); margin-bottom: var(--space-md); transition: all 250ms ease; }
        .recommendation-card:hover { border-color: var(--accent-primary); }
        .recommendation-icon { width: 56px; height: 56px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .recommendation-content { flex: 1; }
        .recommendation-title { font-weight: 600; margin-bottom: var(--space-xs); }
        .recommendation-description { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: var(--space-sm); }
        .recommendation-impact { font-family: var(--font-mono); font-weight: 600; color: var(--success); }
        .progress-bar { height: 8px; background: var(--bg-elevated); border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary)); border-radius: 4px; }
        .trainer-item { display: flex; align-items: center; gap: 16px; padding: 12px; background: var(--bg-secondary); border-radius: 12px; margin-bottom: 8px; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--space-lg); }
        .text-muted { color: var(--text-muted); }
        @media (max-width: 1400px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } .charts-grid { grid-template-columns: 1fr; } }
        @media (max-width: 768px) { .sidebar { display: none; } .main-content { margin-left: 0; } .stats-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        const { AreaChart, Area, BarChart, Bar, PieChart, Pie, Cell, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = Recharts;

        // Icons as SVG components
        const Icon = ({ name, size = 24, color = 'currentColor' }) => {
            const icons = {
                activity: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>,
                'layout-dashboard': <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>,
                users: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
                'trending-down': <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>,
                'trending-up': <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>,
                'dollar-sign': <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>,
                target: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
                star: <svg width={size} height={size} viewBox="0 0 24 24" fill={color} stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
                'arrow-up-right': <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>,
                'arrow-down-right': <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="7" y1="7" x2="17" y2="17"/><polyline points="17 7 17 17 7 17"/></svg>,
                'alert-triangle': <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
                settings: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
                'help-circle': <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
            };
            return icons[name] || null;
        };

        // Demo data generator
        const generateDemoData = () => {
            const months = ['Янв', 'Фев', 'Мар', 'Апр', 'Май', 'Июн', 'Июл', 'Авг', 'Сен', 'Окт', 'Ноя', 'Дек'];
            const currentMonth = new Date().getMonth();
            
            return {
                summary: {
                    active_clients: 247,
                    total_clients: 312,
                    monthly_revenue: 1847500,
                    revenue_growth: 12.5,
                    sessions_30d: 1823,
                    retention_rate: 79.2,
                    avg_satisfaction: 4.6,
                    avg_subscription: 7475
                },
                weekly_visits: Array.from({ length: 12 }, (_, i) => ({
                    week: `Нед ${i + 1}`,
                    visits: Math.floor(100 + Math.random() * 80)
                })),
                visits_by_weekday: [
                    { day: 'Пн', visits: 285 },
                    { day: 'Вт', visits: 312 },
                    { day: 'Ср', visits: 298 },
                    { day: 'Чт', visits: 276 },
                    { day: 'Пт', visits: 245 },
                    { day: 'Сб', visits: 189 },
                    { day: 'Вс', visits: 134 }
                ],
                subscription_distribution: [
                    { type: 'Базовый', count: 142, avg_price: 3500 },
                    { type: 'Стандарт', count: 67, avg_price: 5500 },
                    { type: 'Премиум', count: 31, avg_price: 8500 },
                    { type: 'VIP', count: 7, avg_price: 15000 }
                ],
                top_trainers: [
                    { name: 'Александр Петров', sessions: 89, rating: 4.9 },
                    { name: 'Мария Иванова', sessions: 76, rating: 4.8 },
                    { name: 'Дмитрий Сидоров', sessions: 71, rating: 4.7 },
                    { name: 'Елена Козлова', sessions: 65, rating: 4.8 },
                    { name: 'Игорь Волков', sessions: 58, rating: 4.6 }
                ],
                recommendations: [
                    {
                        type: 'retention',
                        priority: 'high',
                        title: '23 клиента не посещали зал более 30 дней',
                        description: 'Рекомендуется запустить реактивационную кампанию: персональные звонки, специальные предложения.',
                        potential_impact: 69000
                    },
                    {
                        type: 'upsell',
                        priority: 'high',
                        title: 'Низкая доля премиум подписок',
                        description: 'Только 15.4% клиентов имеют премиум подписки. Рекомендуется запустить программу апгрейда.',
                        potential_impact: 213000
                    },
                    {
                        type: 'capacity',
                        priority: 'medium',
                        title: 'Низкая загрузка в выходные',
                        description: 'Посещаемость в Сб-Вс на 35% ниже средней. Рекомендуется ввести специальные акции.',
                        potential_impact: 45000
                    }
                ]
            };
        };

        const COLORS = ['#00d4aa', '#5c7cfa', '#a855f7', '#ffc107', '#ff4757'];

        const formatNumber = (num, decimals = 0) => {
            if (num === null || num === undefined) return '—';
            return new Intl.NumberFormat('ru-RU', { minimumFractionDigits: decimals, maximumFractionDigits: decimals }).format(num);
        };

        const formatCurrency = (amount) => {
            if (amount === null || amount === undefined) return '—';
            return new Intl.NumberFormat('ru-RU', { style: 'currency', currency: 'RUB', minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(amount);
        };

        const StatCard = ({ title, value, icon, change, changeType, variant = 'default' }) => (
            <div className={`card stat-card ${variant}`}>
                <div className={`stat-icon ${variant}`}>
                    <Icon name={icon} size={24} color={
                        variant === 'warning' ? '#ffc107' :
                        variant === 'danger' ? '#ff4757' :
                        variant === 'info' ? '#5c7cfa' :
                        variant === 'purple' ? '#a855f7' : '#00d4aa'
                    } />
                </div>
                <div className="card-value">{value}</div>
                <div className="card-title">{title}</div>
                {change !== undefined && (
                    <div className={`stat-change ${changeType}`}>
                        <Icon name={changeType === 'positive' ? 'arrow-up-right' : 'arrow-down-right'} size={16} />
                        {change}%
                    </div>
                )}
            </div>
        );

        const CustomTooltip = ({ active, payload, label }) => {
            if (active && payload && payload.length) {
                return (
                    <div style={{ background: '#1a1a24', border: '1px solid rgba(255,255,255,0.1)', borderRadius: '8px', padding: '12px' }}>
                        <p style={{ color: '#a0a0b0', marginBottom: '4px', fontSize: '0.85rem' }}>{label}</p>
                        {payload.map((entry, index) => (
                            <p key={index} style={{ color: entry.color, fontWeight: 600 }}>
                                {entry.name}: {formatNumber(entry.value)}
                            </p>
                        ))}
                    </div>
                );
            }
            return null;
        };

        const Dashboard = () => {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                setTimeout(() => {
                    setData(generateDemoData());
                    setLoading(false);
                }, 800);
            }, []);

            if (loading) {
                return (
                    <div className="loading">
                        <div className="spinner"></div>
                        <span className="text-muted">Загрузка данных...</span>
                    </div>
                );
            }

            const { summary, weekly_visits, visits_by_weekday, subscription_distribution, top_trainers, recommendations } = data;

            return (
                <div>
                    <div className="page-header">
                        <h1 className="page-title">Дашборд</h1>
                        <p className="page-subtitle">Обзор ключевых показателей фитнес-центра</p>
                    </div>

                    <div className="stats-grid">
                        <StatCard title="Активные клиенты" value={formatNumber(summary.active_clients)} icon="users" change={summary.retention_rate} changeType="positive" />
                        <StatCard title="Выручка за месяц" value={formatCurrency(summary.monthly_revenue)} icon="dollar-sign" change={summary.revenue_growth} changeType="positive" variant="info" />
                        <StatCard title="Тренировок за 30 дней" value={formatNumber(summary.sessions_30d)} icon="activity" variant="purple" />
                        <StatCard title="Средняя оценка" value={formatNumber(summary.avg_satisfaction, 1)} icon="star" variant="warning" />
                    </div>

                    <div className="charts-grid">
                        <div className="chart-card">
                            <h3 className="card-title" style={{ marginBottom: '24px' }}>Динамика посещений</h3>
                            <ResponsiveContainer width="100%" height={300}>
                                <AreaChart data={weekly_visits}>
                                    <defs>
                                        <linearGradient id="colorVisits" x1="0" y1="0" x2="0" y2="1">
                                            <stop offset="5%" stopColor="#00d4aa" stopOpacity={0.3}/>
                                            <stop offset="95%" stopColor="#00d4aa" stopOpacity={0}/>
                                        </linearGradient>
                                    </defs>
                                    <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.05)" />
                                    <XAxis dataKey="week" stroke="#6b6b7b" tick={{ fill: '#6b6b7b', fontSize: 12 }} />
                                    <YAxis stroke="#6b6b7b" tick={{ fill: '#6b6b7b', fontSize: 12 }} />
                                    <Tooltip content={<CustomTooltip />} />
                                    <Area type="monotone" dataKey="visits" name="Посещения" stroke="#00d4aa" strokeWidth={2} fillOpacity={1} fill="url(#colorVisits)" />
                                </AreaChart>
                            </ResponsiveContainer>
                        </div>

                        <div className="chart-card">
                            <h3 className="card-title" style={{ marginBottom: '24px' }}>Типы подписок</h3>
                            <ResponsiveContainer width="100%" height={300}>
                                <PieChart>
                                    <Pie data={subscription_distribution} cx="50%" cy="50%" innerRadius={60} outerRadius={100} paddingAngle={5} dataKey="count" nameKey="type" label={({ type, count }) => `${type}: ${count}`} labelLine={{ stroke: '#6b6b7b' }}>
                                        {subscription_distribution.map((entry, index) => (
                                            <Cell key={`cell-${index}`} fill={COLORS[index % COLORS.length]} />
                                        ))}
                                    </Pie>
                                    <Tooltip content={<CustomTooltip />} />
                                </PieChart>
                            </ResponsiveContainer>
                        </div>
                    </div>

                    <div className="charts-grid">
                        <div className="chart-card">
                            <h3 className="card-title" style={{ marginBottom: '24px' }}>Посещения по дням недели</h3>
                            <ResponsiveContainer width="100%" height={250}>
                                <BarChart data={visits_by_weekday}>
                                    <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.05)" />
                                    <XAxis dataKey="day" stroke="#6b6b7b" tick={{ fill: '#6b6b7b', fontSize: 12 }} />
                                    <YAxis stroke="#6b6b7b" tick={{ fill: '#6b6b7b', fontSize: 12 }} />
                                    <Tooltip content={<CustomTooltip />} />
                                    <Bar dataKey="visits" name="Посещения" fill="#5c7cfa" radius={[4, 4, 0, 0]} />
                                </BarChart>
                            </ResponsiveContainer>
                        </div>

                        <div className="chart-card">
                            <h3 className="card-title" style={{ marginBottom: '24px' }}>Топ тренеры</h3>
                            {top_trainers.map((trainer, index) => (
                                <div key={index} className="trainer-item">
                                    <div className="avatar">{trainer.name.charAt(0)}</div>
                                    <div style={{ flex: 1 }}>
                                        <div style={{ fontWeight: 600 }}>{trainer.name}</div>
                                        <div style={{ fontSize: '0.85rem', color: 'var(--text-muted)' }}>{trainer.sessions} сессий</div>
                                    </div>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '4px' }}>
                                        <Icon name="star" size={16} color="#ffc107" />
                                        <span style={{ fontWeight: 600 }}>{trainer.rating}</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div style={{ marginTop: '32px' }}>
                        <h3 style={{ fontSize: '1.25rem', fontWeight: 700, marginBottom: '16px' }}>Рекомендации системы</h3>
                        <p style={{ color: 'var(--text-secondary)', marginBottom: '24px' }}>
                            Потенциальный дополнительный доход: {formatCurrency(recommendations.reduce((acc, r) => acc + r.potential_impact, 0))}
                        </p>
                        
                        {recommendations.map((rec, index) => (
                            <div key={index} className="recommendation-card">
                                <div className="recommendation-icon" style={{ background: rec.priority === 'high' ? 'var(--danger-soft)' : 'var(--warning-soft)' }}>
                                    <Icon name={rec.priority === 'high' ? 'alert-triangle' : 'trending-up'} size={24} color={rec.priority === 'high' ? '#ff4757' : '#ffc107'} />
                                </div>
                                <div className="recommendation-content">
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '4px' }}>
                                        <span className="recommendation-title">{rec.title}</span>
                                        <span className={`badge ${rec.priority === 'high' ? 'danger' : 'warning'}`}>
                                            {rec.priority === 'high' ? 'Важно' : 'Средний'}
                                        </span>
                                    </div>
                                    <p className="recommendation-description">{rec.description}</p>
                                    <span className="recommendation-impact">+{formatCurrency(rec.potential_impact)} потенциальный доход</span>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // Simplified pages for demo
        const ClientsPage = () => (
            <div>
                <div className="page-header">
                    <h1 className="page-title">Клиенты</h1>
                    <p className="page-subtitle">Управление клиентской базой и персональная аналитика</p>
                </div>
                <div className="card" style={{ textAlign: 'center', padding: '48px' }}>
                    <Icon name="users" size={64} color="#00d4aa" />
                    <h3 style={{ marginTop: '24px', marginBottom: '12px' }}>247 активных клиентов</h3>
                    <p style={{ color: 'var(--text-secondary)' }}>
                        Полная версия включает детальную аналитику по каждому клиенту, риск оттока и потенциал апсейла
                    </p>
                </div>
            </div>
        );

        const ChurnPage = () => (
            <div>
                <div className="page-header">
                    <h1 className="page-title">Анализ оттока</h1>
                    <p className="page-subtitle">Предиктивная аналитика и управление удержанием</p>
                </div>
                <div className="stats-grid" style={{ gridTemplateColumns: 'repeat(3, 1fr)' }}>
                    <div className="card stat-card danger">
                        <div className="stat-icon danger"><Icon name="alert-triangle" size={24} color="#ff4757" /></div>
                        <div className="card-value">18</div>
                        <div className="card-title">Высокий риск оттока</div>
                    </div>
                    <div className="card stat-card warning">
                        <div className="stat-icon warning"><Icon name="trending-down" size={24} color="#ffc107" /></div>
                        <div className="card-value">34</div>
                        <div className="card-title">Средний риск</div>
                    </div>
                    <div className="card stat-card">
                        <div className="stat-icon"><Icon name="users" size={24} color="#00d4aa" /></div>
                        <div className="card-value">65</div>
                        <div className="card-title">Всего ушло</div>
                    </div>
                </div>
            </div>
        );

        const RevenuePage = () => (
            <div>
                <div className="page-header">
                    <h1 className="page-title">Финансовая аналитика</h1>
                    <p className="page-subtitle">Анализ выручки и финансовых показателей</p>
                </div>
                <div className="stats-grid">
                    <div className="card stat-card info">
                        <div className="stat-icon info"><Icon name="dollar-sign" size={24} color="#5c7cfa" /></div>
                        <div className="card-value">{formatCurrency(1847500)}</div>
                        <div className="card-title">Выручка за месяц</div>
                        <div className="stat-change positive"><Icon name="arrow-up-right" size={16} />12.5%</div>
                    </div>
                    <div className="card stat-card purple">
                        <div className="stat-icon purple"><Icon name="users" size={24} color="#a855f7" /></div>
                        <div className="card-value">{formatCurrency(7475)}</div>
                        <div className="card-title">ARPU (30 дней)</div>
                    </div>
                    <div className="card stat-card">
                        <div className="stat-icon"><Icon name="trending-up" size={24} color="#00d4aa" /></div>
                        <div className="card-value">{formatCurrency(2070000)}</div>
                        <div className="card-title">Прогноз</div>
                    </div>
                    <div className="card stat-card warning">
                        <div className="stat-icon warning"><Icon name="target" size={24} color="#ffc107" /></div>
                        <div className="card-value">{formatCurrency(5890)}</div>
                        <div className="card-title">Средний чек</div>
                    </div>
                </div>
            </div>
        );

        const ProgramsPage = () => (
            <div>
                <div className="page-header">
                    <h1 className="page-title">Эффективность программ</h1>
                    <p className="page-subtitle">Анализ тренировочных программ</p>
                </div>
                <div className="stats-grid" style={{ gridTemplateColumns: 'repeat(3, 1fr)' }}>
                    <div className="card stat-card">
                        <div className="stat-icon"><Icon name="target" size={24} color="#00d4aa" /></div>
                        <div className="card-value">24</div>
                        <div className="card-title">Активных программ</div>
                    </div>
                    <div className="card stat-card info">
                        <div className="stat-icon info"><Icon name="star" size={24} color="#5c7cfa" /></div>
                        <div className="card-value">87.3</div>
                        <div className="card-title">Лучший рейтинг</div>
                    </div>
                    <div className="card stat-card purple">
                        <div className="stat-icon purple"><Icon name="users" size={24} color="#a855f7" /></div>
                        <div className="card-value">4.6</div>
                        <div className="card-title">Средняя оценка</div>
                    </div>
                </div>
            </div>
        );

        const Sidebar = ({ currentPage, setCurrentPage }) => {
            const navItems = [
                { id: 'dashboard', label: 'Дашборд', icon: 'layout-dashboard' },
                { id: 'clients', label: 'Клиенты', icon: 'users' },
                { id: 'churn', label: 'Анализ оттока', icon: 'trending-down' },
                { id: 'revenue', label: 'Финансы', icon: 'dollar-sign' },
                { id: 'programs', label: 'Программы', icon: 'target' },
            ];

            return (
                <aside className="sidebar">
                    <div className="sidebar-logo">
                        <div className="logo-icon">
                            <Icon name="activity" size={24} color="#0a0a0f" />
                        </div>
                        <div className="logo-text">Fit<span>Analytics</span></div>
                    </div>

                    <nav>
                        <div className="nav-section">
                            <div className="nav-section-title">Основное</div>
                            {navItems.slice(0, 2).map(item => (
                                <button key={item.id} className={`nav-item ${currentPage === item.id ? 'active' : ''}`} onClick={() => setCurrentPage(item.id)}>
                                    <Icon name={item.icon} size={20} />
                                    <span>{item.label}</span>
                                </button>
                            ))}
                        </div>

                        <div className="nav-section">
                            <div className="nav-section-title">Аналитика</div>
                            {navItems.slice(2).map(item => (
                                <button key={item.id} className={`nav-item ${currentPage === item.id ? 'active' : ''}`} onClick={() => setCurrentPage(item.id)}>
                                    <Icon name={item.icon} size={20} />
                                    <span>{item.label}</span>
                                </button>
                            ))}
                        </div>

                        <div className="nav-section" style={{ marginTop: 'auto' }}>
                            <div className="nav-section-title">Система</div>
                            <button className="nav-item">
                                <Icon name="settings" size={20} />
                                <span>Настройки</span>
                            </button>
                            <button className="nav-item">
                                <Icon name="help-circle" size={20} />
                                <span>Помощь</span>
                            </button>
                        </div>
                    </nav>

                    <div style={{ padding: '16px', background: 'var(--bg-card)', borderRadius: '12px', marginTop: '16px' }}>
                        <div style={{ fontSize: '0.8rem', color: 'var(--text-muted)', marginBottom: '4px' }}>ВКР Бакалавра</div>
                        <div style={{ fontWeight: 600, fontFamily: 'var(--font-mono)' }}>v1.0.0</div>
                    </div>
                </aside>
            );
        };

        const App = () => {
            const [currentPage, setCurrentPage] = useState('dashboard');

            const renderPage = () => {
                switch (currentPage) {
                    case 'dashboard': return <Dashboard />;
                    case 'clients': return <ClientsPage />;
                    case 'churn': return <ChurnPage />;
                    case 'revenue': return <RevenuePage />;
                    case 'programs': return <ProgramsPage />;
                    default: return <Dashboard />;
                }
            };

            return (
                <div className="app">
                    <Sidebar currentPage={currentPage} setCurrentPage={setCurrentPage} />
                    <main className="main-content">
                        {renderPage()}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
